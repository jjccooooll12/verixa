warehouse:
  kind: bigquery
  project: dataguard-494111
  location: US

rules:
  null_rate_change:
    warning_delta: 0.02
    error_delta: 0.05
  row_count_change:
    warning_drop_ratio: 0.15
    error_drop_ratio: 0.40
    warning_growth_ratio: 0.25
    error_growth_ratio: 1.50

baseline:
  warning_age: 168h

sources:
  stripe.transactions:
    table: dataguard_demo.stripe_transactions
    scan:
      timestamp_column: created_at
      lookback: 30d
    check:
      fail_on_warning: false
    freshness:
      column: created_at
      max_age: 24h
    schema:
      transaction_id: string
      amount: float
      currency: string
      created_at: timestamp
    tests:
      - no_nulls: transaction_id
      - no_nulls: amount
      - accepted_values:
          column: currency
          values: [USD, EUR, GBP]
